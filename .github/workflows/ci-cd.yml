name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  CI_DATABASE_URL: mongodb://localhost:27017/eest-ci
  CI_NEXTAUTH_SECRET: ci-nextauth-secret
  CI_NEXTAUTH_URL: http://localhost:3000
  CI_PORTAL_PASSWORD_SECRET: ci-portal-secret

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ env.CI_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ env.CI_NEXTAUTH_URL }}
          PORTAL_PASSWORD_SECRET: ${{ env.CI_PORTAL_PASSWORD_SECRET }}

  deploy:
    name: Deploy to Vercel (Production)
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://school.emergingedge.tech
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        id: vercel
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod

      - name: Deployment URL
        run: echo "Live at ${{ steps.vercel.outputs.preview-url }}"
