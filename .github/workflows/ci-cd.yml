name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  CI_DATABASE_URL: mongodb://localhost:27017/eest-ci
  CI_NEXTAUTH_SECRET: ci-nextauth-secret
  CI_NEXTAUTH_URL: http://localhost:3000
  CI_PORTAL_PASSWORD_SECRET: ci-portal-secret

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ env.CI_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ env.CI_NEXTAUTH_URL }}
          PORTAL_PASSWORD_SECRET: ${{ env.CI_PORTAL_PASSWORD_SECRET }}
